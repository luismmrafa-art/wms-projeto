<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxToCar - Criar Conta</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="tela-auth">

    <div class="caixa-login">
        <img src="logo.png" alt="Logo" class="logo-auth">
        <h1>BoxToCar</h1>
        <p class="subtitulo">Cria o teu armazém e a tua conta de Gestor</p>

        <div class="campo">
            <label>O teu Nome:</label>
            <input type="text" id="inputNome" placeholder="Ex: João Silva">
        </div>

        <div class="campo">
            <label>Email:</label>
            <input type="email" id="inputEmail" placeholder="ex: joao@email.com">
        </div>

        <div class="campo">
            <label>Password:</label>
            <input type="password" id="inputSenha" placeholder="Cria uma password forte">
        </div>

        <div class="campo">
            <label>Nome do Armazém:</label>
            <input type="text" id="inputArmazem" placeholder="Ex: Armazém Central">
        </div>

        <div class="campo">
            <label>Cidade (opcional):</label>
            <input type="text" id="inputCidade" placeholder="Ex: Porto">
        </div>

        <button class="btn-entrar btn-verde" onclick="fazerRegisto()">CRIAR CONTA</button>
        
        <div class="rodape">
            Já tens conta? <a href="login.html">Faz Login aqui</a>
        </div>
    </div>

    <script>
        // Função principal que envia os dados de registo para o servidor
        async function fazerRegisto() {
            // Vai buscar os valores que o utilizador escreveu nos campos
            const nome = document.getElementById('inputNome').value;
            const email = document.getElementById('inputEmail').value;
            const senha = document.getElementById('inputSenha').value;
            const nomeArmazem = document.getElementById('inputArmazem').value;
            const cidade = document.getElementById('inputCidade').value;

            // Segurança básica: Impede o envio se faltar algum dado obrigatório
            if(!nome || !email || !senha || !nomeArmazem) return alert("Preenche o nome, email, password e o nome do armazém!");

            try {
                // Faz um pedido POST à API com os dados em formato JSON
                const res = await fetch('/api/registo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, nomeArmazem, cidade })
                });

                // Converte a resposta do servidor para ler a mensagem ou o erro
                const data = await res.json();

                if (res.ok) {
                    // Se o registo correr bem, mostra o código de convite (os operadores
                    // precisam dele para se registarem neste armazém) e só depois avança para o Login
                    alert("✅ " + data.mensagem + "\n\n🔑 Código de convite para os teus operadores: " + data.codigoConvite + "\n\nGuarda este código — vais precisar dele para os operadores se registarem na app.");
                    window.location.href = 'login.html'; // Manda o cliente para o Login!
                } else {
                    // Se o servidor der erro (ex: email já existe), mostra o erro
                    alert("❌ " + data.erro);
                }
            } catch (erro) {
                // Caso o servidor esteja desligado ou haja um problema de ligação
                alert("Erro de rede. Verifica se o servidor está ligado.");
            }
        }
    </script>
</body>
</html>
