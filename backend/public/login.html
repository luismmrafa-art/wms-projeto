<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - Acesso ao Sistema</title>
    <style>
        /* Estilos base: Centra a caixa de login no meio do ecrã com um fundo escuro */
        body { font-family: 'Segoe UI', sans-serif; background: #1d3557; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #333;}
        .caixa-login { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; }
        .caixa-login h1 { color: #1d3557; margin-top: 0; font-size: 24px;}
        .campo { margin-bottom: 20px; text-align: left; }
        .campo label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        .campo input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px;}
        .btn-entrar { background: #e63946; color: white; border: none; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s;}
        .btn-entrar:hover { background: #c1121f; }
        .rodape { margin-top: 20px; font-size: 12px; color: #777;}
    </style>
</head>
<body>

    <div class="caixa-login">
        <h1>📦 WMS Enterprise</h1>
        <p style="color:#666; margin-bottom: 30px; font-size: 14px;">Inicie sessão para continuar</p>
        
        <div class="campo">
            <label>Email:</label>
            <input type="email" id="inputEmail" placeholder="ex: admin@wms.pt">
        </div>
        
        <div class="campo">
            <label>Password:</label>
            <input type="password" id="inputSenha" placeholder="••••">
        </div>

        <button class="btn-entrar" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
        
        <div class="rodape">
            Ainda não és cliente? <a href="registo.html" style="color: #1d3557; font-weight: bold; text-decoration: none;">Regista-te aqui</a>
            <br><br>
            <span style="font-size: 11px;"> <b>admin@wms.pt</b> | pass: <b>1234</b></span>
        </div>
    </div>

    <script>
        // Função responsável por validar as credenciais junto da API
        async function fazerLogin() {
            // Captura os dados inseridos pelo utilizador
            const email = document.getElementById('inputEmail').value;
            const senha = document.getElementById('inputSenha').value;

            // Prevenção básica: não envia o pedido se houver campos vazios
            if(!email || !senha) return alert("Preenche todos os campos!");

            try {
                // Envia as credenciais para o servidor (rota definida no express)
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                // Converte a resposta em formato legível (JSON)
                const data = await res.json();

                if (res.ok) {
                    // Guarda na memória temporária do browser (sessionStorage) as permissões da pessoa
                    // Isto serve para as outras páginas saberem quem está a navegar (ex: Gestor vs Cliente)
                    sessionStorage.setItem('cargoUtilizador', data.cargo);
                    
                    // 👉 A NOVIDADE: Guarda a Chave do Armazém!
                    // Muito importante para sistemas Multi-Armazém (saber qual o mapa a carregar)
                    sessionStorage.setItem('armazemID', data.armazemId); 

                    // Atira a pessoa para a página certa baseada no cargo (ex: /index.html ou /loja.html)
                    window.location.href = data.redirecionar; 
                } else {
                    // Se a palavra-passe estiver errada ou a conta não existir
                    alert("❌ " + data.erro);
                }
            } catch (erro) {
                // Tratamento de erro caso o servidor NodeJS esteja desligado
                alert("Erro ao comunicar com o servidor.");
            }
        }
    </script>
</body>
</html>
